{% extends "base.html" %}
{% block content %}
        <h2 style="color: blueviolet;">ยินดีต้อนรับเข้าสู่ประชากร</h2>
        <table class="table table-hover">
            <thead>
                <tr>
                    <th scope="col">รหัสประชากร</th>
                    <th scope="col">ชื่อประชากร</th>
                    <th scope="col">อายุ</th>
                    <th scope="col" class="text-center">แก้ไข</th>
                    <th scope="col" class="text-center">ลบ</th>
                </tr>
            </thead>
            <tbody>
                {% for person in all_person %}
                <tr>
                    <th scope="row">{{person.id}}</th>
                    <td>{{person.name}}</td>
                    <td>{{person.age}}</td>
                    <td class="text-center"><a href="#" class="btn text-white" style="background-color: #e91e8c;">แก้ไข</a></td>
                    <td class="text-center"><a href="#" class="btn text-white" style="background-color: #fd7e14;">ลบ</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
{% endblock %}
