{% extends "base.html" %}
{% block content %}
        <div class="card shadow-sm" style="max-width: 500px; margin: 0 auto;">
            <div class="card-header text-white text-center" style="background-color: #e91e8c;">
                <h5 class="mb-0">แก้ไขข้อมูลประชากร</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">ชื่อประชากร</label>
                        <input type="text" class="form-control" name="name" value="{{person.name}}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">อายุ</label>
                        <input type="number" class="form-control" name="age" value="{{person.age}}">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn text-white" style="background-color: #e91e8c;">บันทึก</button>
                        <a href="/" class="btn btn-secondary">ยกเลิก</a>
                    </div>
                </form>
            </div>
        </div>
{% endblock %}
